
spring:
  threads:
    virtual:
      enabled: true
  jpa:
    hibernate:
      ddl-auto: validate
  flyway:
    repair-on-migrate: true
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: false   # only set true if migrating an existing DB
    out-of-order: false          # enforce strict version ordering in production
    validate-on-migrate: true    # fail fast if a checksum doesn't match
  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS}
  redis:
    host: ${REDIS_HOST}
    port: ${REDIS_PORT:6379}
  output:
    ansi:
      enabled: ALWAYS
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n"
  application:
    name: authmat
  jackson:
    deserialization:
      fail-on-unknown-properties: true
  security:
    oauth2:
      client:
        registration:
          google:
            client-id: ${GOOGLE_OAUTH2_CLIENT_ID}
            client-secret: ${GOOGLE_OAUTH2_CLIENT_SECRET}
            redirect-uri: "{baseUrl}/login/oauth2/code/{registrationId}"
            scope:
              - openid
              - profile
              - email
        provider:
          google:
            issuer-uri: https://accounts.google.com
            authorization-uri: https://accounts.google.com/o/oauth2/v2/auth
            token-uri: https://oauth2.googleapis.com/token
            user-info-uri: https://www.googleapis.com/oauth2/v3/userinfo

management:
  endpoints:
    web:
      base-path: /authmat-actuator
      exposure:
        include: health, metrics, prometheus
  endpoint:
    health:
      show-details: always
  metrics:
    export:
      prometheus:
        enabled: true

aws:
  region: ${AWS_REGION}
  kms:
    key-id: ${AWS_KMS_KEY_ID}
    kid: ${AWS_KMS_KID:authmat-kms-v1}

security:
  login-attempt:
    max-failed-login-attempts: ${MAX_FAILED_LOGIN_ATTEMPTS:5}
    failed-login-lockout-mins: ${FAILED_LOGIN_LOCKOUT_MINS:10}

authmat:
  services:
    spiffe://authdoc.internal/dockeep:
      scopes: ["auth:validate", "auth:introspect"]
    spiffe://authdoc.internal/gateway:
      scopes: ["auth:validate"]
  registration:
    provider: ${PROVIDER:LOCAL}
    provider-id: ${PROVIDER_ID:authmat}
  token:
    algorithm:
      key-algorithm: ${TOKEN_KEY_ALGORITHM:EC}
      signature-algorithm: ${TOKEN_SIGNATURE_ALGORITHM:ES256}
      curve: ${ALGORITHM_CURVE:P-256}
    signer: ${TOKEN_SIGNER}
    access-token-ttl: ${ACCESS_TOKEN_TTL:5}
    refresh-token-ttl: ${REFRESH_TOKEN_TTL:20}
    issuer: ${ISSUER}
    audience: ${AUDIENCE}
    key-id: ${KEY_ID:}
  endpoints:
    auth: ${AUTH_ENDPOINT:/auth}
  public-paths:
    login: ${AUTH_ENDPOINT:/auth}/login
    register: ${AUTH_ENDPOINT:/auth}/register
    jwks: /.well-known/jwks.json
