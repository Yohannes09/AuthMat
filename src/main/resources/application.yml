
spring:
  jpa:
    hibernate:
      ddl-auto: validate
  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: false   # only set true if migrating an existing DB
    out-of-order: false          # enforce strict version ordering in production
    validate-on-migrate: true    # fail fast if a checksum doesn't match
  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS}
  redis:
    host: ${REDIS_HOST}
    port: ${REDIS_PORT}
  output:
    ansi:
      enabled: ALWAYS
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n"
  application:
    name: authmat
  jackson:
    deserialization:
      fail-on-unknown-properties: true
  security:
    oauth2:
      client:
        registration:
          google:
            client-id: ${GOOGLE_OAUTH2_CLIENT_ID}
            client-secret: ${GOOGLE_OAUTH2_CLIENT_SECRET}
            redirect-uri: "{baseUrl}/login/oauth2/code/{registrationId}"
            scope:
              - openid
              - profile
              - email
        provider:
          google:
            issuer-uri: https://accounts.google.com
            authorization-uri: https://accounts.google.com/o/oauth2/v2/auth
            token-uri: https://oauth2.googleapis.com/token
            user-info-uri: https://www.googleapis.com/oauth2/v3/userinfo

management:
  endpoints:
    web:
      base-path: /authmat-actuator
      exposure:
        include: health, metrics, prometheus
  endpoint:
    health:
      show-details: always
  metrics:
    export:
      prometheus:
        enabled: true

aws:
  region: ${AWS_REGION}
  kms:
    key-id: ${AWS_KMS_KEY_ID}
    kid: ${AWS_KMS_KID:authmat-kms-v1}

authmat:
  registration:
    provider: ${PROVIDER:LOCAL}
    provider-id: ${PROVIDER_ID:authmat}
  token:
    access-token-ttl: ${ACCESS_TOKEN_TTL}
    refresh-token-ttl: ${REFRESH_TOKEN_TTL}
    issuer: ${ISSUER}
    audience: ${AUDIENCE}
    kms-key-id: ${AWS_KMS_KEY_ID}
  endpoints: